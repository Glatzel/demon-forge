name: update
on:
  workflow_dispatch:
  schedule:
    - cron: 0 16 * * *
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
env:
  WORKFLOW_NAME: ${{ github.workflow }}
jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Update
        run: ./scripts/update.ps1
        shell: pwsh
        env:
          GH_TOKEN: ${{github.token}}
