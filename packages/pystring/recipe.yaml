context:
  name: pystring
  version: "1.1.4"
package:
  version: ${{ version }}
  name: ${{ name }}
source:
  - url: https://github.com/imageworks/pystring/archive/refs/tags/v${{ version }}.tar.gz
build:
  number: 10
  script: pwsh -Command "& $RECIPE_DIR/build-${{ name }}.ps1"
requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake 3.*
    - ninja
about:
  repository: https://github.com/imageworks/pystring
