context:
  name: atuin
package:
  version: "18.16.0"
  name: ${{ name }}
build:
  number: 0
requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
  run:
    - ${{'ble-sh' if linux}}
tests:
  - package_contents:
      bin:
        - ${{ name }}
about:
  repository: https://github.com/atuinsh/atuin

extra:
  update: |
    $latest_version = get-version-crateio -name $name
    update-recipe $latest_version
    
