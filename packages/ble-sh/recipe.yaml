context:
  name: ble-sh
  version: "0.4.0"
package:
  version: ${{ version }}
  name: ${{ name }}
build:
  number: 0
  script: |
    git clone --recursive --depth 1 --shallow-submodules https://github.com/akinomyoga/ble.sh.git
    make -C ble.sh install PREFIX=$PREFIX
requirements:
  build:
    - make
    - gawk
tests:
  - package_contents:
      files:
        exists:
          - share/blesh/ble.sh
about:
  repository: https://github.com/akinomyoga/ble.sh
