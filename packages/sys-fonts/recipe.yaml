context:
  name: sys-fonts
package:
  version: "1.0.0"
  name: ${{ name }}
build:
  number: 1
  script:
    interpreter: powershell
    content: |
      new-item $env:PREFIX/Scripts -itemType Directory -Force -ErrorAction SilentlyContinue
      Copy-Item $env:RECIPE_DIR/install-sys.ps1 $env:PREFIX/Scripts/install-font.ps1
