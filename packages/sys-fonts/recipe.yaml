context:
  name: sys-fonts
package:
  version: "1.0.1"
  name: ${{ name }}
build:
  number: 0
  script:
    interpreter: powershell
    content: |
      new-item $env:PREFIX/Scripts -itemType Directory -Force -ErrorAction SilentlyContinue
      Copy-Item $env:RECIPE_DIR/install-sys-fonts.ps1 $env:PREFIX/Scripts/install-sys-fonts.ps1
requirements:
  run:
    - sys-install
