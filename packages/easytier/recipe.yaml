context:
  name: easytier
  version: "2.6.4"
package:
  version: ${{ version }}
  name: ${{ name }}
source:
  - url: https://github.com/EasyTier/EasyTier/archive/refs/tags/v${{ version }}.tar.gz
build:
  number: 0
requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - if: linux
      then:
        - clang
        - libclang
        - binutils
  host:
    - libprotobuf
tests:
  - package_contents:
      bin:
        - ${{ name }}-core
        - ${{ name }}-cli
  - script: ${{ name }}-core --help
about:
  repository: https://github.com/EasyTier/EasyTier

extra:
  update: get-version-github -repo "EasyTier/EasyTier"
