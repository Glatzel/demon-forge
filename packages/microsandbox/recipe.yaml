context:
  name: microsandbox
  version: "0.3.1"
package:
  version: ${{ version }}
  name: ${{ name }}

build:
  number: 0
  script:
    interpreter: powershell
    file: build.ps1
requirements:
  build:
    - ${{ compiler("c") if linux }}
    - ${{ stdlib("c") if linux }}
  host:
    - if: linux
      then:
        - openssl
        - libgcc
        - libcap-ng-dev
tests:
  - package_contents:
      bin:
        - msb
        - msbnet
  - script:
      - msb --help
      - msb run --help
      - msb run --detach debian:12-slim -- ls
      - msb ls
about:
  repository: https://github.com/zerocore-ai/microsandbox
