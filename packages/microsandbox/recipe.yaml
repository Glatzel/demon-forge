context:
  name: microsandbox
  version: "0.3.0"
package:
  version: ${{ version }}
  name: ${{ name }}

build:
  number: 0
  script:
    interpreter: powershell
    file: build.ps1
requirements:
  host:
    - ${{stdlib("c")}}
    - openssl
tests:
  - package_contents:
      bin:
        - msb
        - msbnet
about:
  repository: https://github.com/zerocore-ai/microsandbox
