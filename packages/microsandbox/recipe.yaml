context:
  name: microsandbox
  version: "0.5.7"
package:
  version: ${{ version }}
  name: ${{ name }}
source:
  - url: https://github.com/zerocore-ai/microsandbox/archive/refs/tags/v${{ version }}.tar.gz
build:
  number: 0
requirements:
  build:
    - ${{ compiler("rust") }}
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - pkg-config
  host:
    - libcap-ng-dev
    - microsandbox-libkrunfw
tests:
  - package_contents:
      bin:
        - msb
  - script:
      - msb --help
      - msb run --help
about:
  repository: https://github.com/zerocore-ai/microsandbox

extra:
  update: get-version-github -repo "zerocore-ai/microsandbox"
  changelog: get-changelog-github "zerocore-ai/microsandbox"
