context:
  name: sys-vscode
package:
  version: "1.123.1"
  name: ${{ name }}
build:
  number: 0
  script:
    interpreter: powershell
    content: |
      new-item $env:PREFIX/Scripts -itemType Directory -Force -ErrorAction SilentlyContinue
      Copy-Item $env:RECIPE_DIR/install-${{name}}.ps1 $env:PREFIX/Scripts/
requirements:
  run:
    - sys-install

extra:
  update: get-version-winget "m/Microsoft/VisualStudioCode"
