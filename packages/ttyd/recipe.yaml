context:
  name: ttyd
  version: "1.7.7"
package:
  version: ${{ version }}
  name: ${{ name }}
source:
  # - url: https://github.com/tsl0922/ttyd/archive/refs/tags/${{ version }}.tar.gz
  - git: https://github.com/tsl0922/ttyd.git
    patches:
      - config.patch
build:
  number: 10
requirements:
  build:
    - nodejs
    - ninja
    - pkg-config
    - cmake 3.*
    - fonts-cascadia-mono-woff2
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: unix
      then:
        - file
        - autoconf
        - automake
  host:
    - json-c
    - libwebsockets
    - zlib

tests:
  - package_contents:
      bin:
        - ${{ name }}
  - if: unix
    then:
      requirements:
        run:
          - curl
        script: |
          "$PREFIX/bin/ttyd" --port 7681 bash &
          TTYD_PID=$!
          sleep 1
          curl -sI http://localhost:7681
          kill "$TTYD_PID"
          wait "$TTYD_PID" 2>/dev/null

  - if: win
    then:
      requirements:
        run:
          - curl
        script:
          - pwsh -Command "Start-Process $PREFIX/bin/${{ name }}${{'.exe' if win}} -ArgumentList '--port 7681 pwsh'"
          - curl -sI http://localhost:7681
          - pwsh -Command "Stop-Process -Name ttyd -Force"

about:
  homepage: https://github.com/tsl0922/ttyd
  license: MIT OR Apache-2.0
  summary: A simple command-line tool for sharing terminal over the web
  description: >
    ttyd is a simple command-line tool for sharing terminal over the web. It is
    based on libwebsockets and provides a web-based terminal emulator.
  repository: https://github.com/tsl0922/ttyd
