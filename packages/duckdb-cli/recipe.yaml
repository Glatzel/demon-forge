context:
  name: duckdb-cli
  version: "1.5.2"
package:
  version: ${{version}}
  name: ${{ name }}
source:
  - url: https://github.com/duckdb/duckdb/releases/download/v${{version}}/duckdb_cli-windows-amd64.zip

build:
  number: 0
tests:
  - package_contents:
      bin:
        - duckdb

about:
  repository: https://github.com/duckdb/duckdb

extra:
  update: get-version-github -repo "duckdb/duckdb"
