context:
  name: android-sdk-platform-tools

package:
  version: "37.0.1"
  name: ${{ name }}
source:
  - if: win
    then:
      url: https://googledownloads.cn/android/repository/platform-tools-latest-windows.zip
  - if: osx
    then:
      url: https://googledownloads.cn/android/repository/platform-tools-latest-darwin.zip
  - if: linux
    then:
      url: https://googledownloads.cn/android/repository/platform-tools-latest-linux.zip
build:
  number: 0
  script:
    interpreter: powershell
    content: |
      New-Item $env:PREFIX/bin -ItemType Directory
      Copy-Item "./*" "$env:PREFIX/bin" -recurse

tests:
  - package_contents:
      bin:
        - adb
  - script: adb --help
about:
  homepage: https://developer.android.com/studio/releases/platform-tools
  license: Apache-2.0
  summary: Android SDK Platform-Tools
  description: >
    Android SDK Platform-Tools includes adb and fastboot, essential command-line
    tools for communicating with Android devices during development and
    debugging.
  documentation: https://developer.android.com/studio/command-line
extra:
  update: get-version-url -url "https://developer.android.com/tools/releases/platform-tools" -pattern '([0-9]+\.[0-9]+\.[0-9]+)'
  changelog: echo "https://developer.android.com/tools/releases/platform-tools"
