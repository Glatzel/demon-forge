context:
  name: cargo-codspeed
package:
  version: "4.7.0"
  name: ${{ name }}
build:
  number: 0
requirements:
  build:
    - ${{ compiler('rust') }}
tests:
  - package_contents:
      bin:
        - ${{name}}
about:
  repository: https://github.com/CodSpeedHQ/codspeed

extra:
  update: get-version-crateio -name $name
  changelog: get-changelog-github CodSpeedHQ/codspeed
