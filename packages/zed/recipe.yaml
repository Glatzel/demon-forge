context:
  name: zed
  version: "1.5.4"
package:
  version: ${{ version }}
  name: ${{ name }}
source:
  url: https://github.com/zed-industries/zed/archive/refs/tags/v${{ version }}.tar.gz
build:
  number: 0
  script:
    interpreter: powershell
    file: build.ps1
requirements:
  build:
    - rust
tests:
  - package_contents:
      bin:
        - ${{ name }}

extra:
  update: get-version-github "zed-industries/zed"
  changelog: get-changelog-github "zed-industries/zed"
