context:
  name: libkrunfw
  version: "5.3.0"
package:
  version: ${{ version }}
  name: ${{ name }}
source:
  - url: https://github.com/containers/libkrunfw/archive/refs/tags/v${{ version }}.tar.gz
build:
  number: 0
  script:
    interpreter: powershell
    content: |
      $arch=uname -m
      make ARCH=$arch
      make install PREFIX=$PREFIX
requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
    - diffutils
    - patch
    - pkg-config
    - python
    - pyelftools
  host:
    - libcap-ng-dev
tests:
  - package_contents:
      lib:
        - libkrunfw
about:
  repository: https://github.com/containers/libkrunfw
