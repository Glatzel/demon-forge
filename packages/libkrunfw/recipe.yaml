context:
  name: libkrunfw
  version: "5.3.0"
package:
  version: ${{ version }}
  name: ${{ name }}
source:
  - url: https://github.com/containers/libkrunfw/archive/refs/tags/v${{ version }}.tar.gz
    patches:
      - makefile.patch
build:
  number: 0
  script:
    content: |
      dnf update -y
      dnf install -y 'dnf-command(builddep)' python3-pyelftools curl
      dnf builddep -y kernel
      make -j$(nproc)
      make install PREFIX=$PREFIX
requirements:
  host:
    - libcap-ng-dev
tests:
  - package_contents:
      lib:
        - libkrunfw
about:
  repository: https://github.com/containers/libkrunfw
