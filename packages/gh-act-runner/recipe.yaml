context:
  name: gh-act-runner
package:
  version: "0.13.0"
  name: ${{ name }}
build:
  number: 0
  script:
    interpreter: powershell
    file: build.ps1
requirements:
  run: nodejs 20.*
tests:
  - package_contents:
      bin:
        - gh-act-runner
about:
  repository: https://github.com/ChristopherHX/github-act-runner

extra:
  update: |
    $latest_version = get-version-github -repo "ChristopherHX/github-act-runner"
    update-recipe $latest_version
    
