context:
  name: sys-rhino
package:
  version: "8.29.26063.11001"
  name: ${{ name }}
build:
  number: 7
  script:
    interpreter: powershell
    file: build.ps1
requirements:
  run:
    - aria2
tests:
  - script:
      interpreter: powershell
      content: |
        sys-install-rhino.ps1
        Resolve-Path "C:\Program Files\Rhino 8\System\Rhino.exe"
