context:
  name: rumqttd
package:
  version: "0.20.0"
  name: ${{ name }}
build:
  number: 5
  script:
    interpreter: powershell
    content: |
      $ROOT = git rev-parse --show-toplevel
      . $ROOT/scripts/util.ps1
      cargo install $name @(Get-Cargo-Arg)
requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
tests:
  - package_contents:
      bin:
        - ${{name}}
  - script: ${{name}} --help
