context:
  name: uutils-diffutils
  version: "0.5.0"
package:
  version: "0.5.0"
  name: ${{ name }}
source:
  url: https://github.com/uutils/diffutils/archive/refs/tags/v${{ version }}.tar.gz
build:
  number: 2
  script:
    interpreter: powershell
    content: |
      $ROOT = git rev-parse --show-toplevel
      . $ROOT/scripts/util.ps1
      cargo install $name @(Get-Cargo-Arg)
requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
tests:
  - package_contents:
      bin:
        - diffutils
about:
  license: MIT
  repository: https://github.com/uutils/diffutils
