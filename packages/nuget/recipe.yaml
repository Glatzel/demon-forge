context:
  name: nuget
  version: "7.3.1"
package:
  name: ${{ name }}
  version: "7.3.1"
source:
  url: https://dist.nuget.org/win-x86-commandline/latest/nuget.exe
build:
  script:
    interpreter: powershell
    content: |
      New-Item $env:PREFIX/bin -ItemType Directory
      Copy-Item "./${env:PKG_NAME}.exe" "$env:PREFIX/bin/${env:PKG_NAME}.exe"
  number: 0
tests:
  - script: ${{ name }} help
about:
  homepage: https://www.nuget.org
  license: Apache-2.0
  summary: Package manager for .NET
  description: >
    NuGet is the package manager for .NET, providing tools to
    create, share, and consume reusable code packages. It
    simplifies dependency management and versioning for .NET
    projects across multiple platforms.
  documentation: https://docs.microsoft.com/en-us/nuget/
  repository: https://github.com/NuGet/NuGet.Client

extra:
  update: |
    $latest_version = curl "https://dist.$name.org/index.json" | jq '.artifacts[0].versions[0].version'
    $latest_version = "$latest_version".Replace("""", "")
    update-recipe $latest_version
    
