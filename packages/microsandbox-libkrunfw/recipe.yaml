context:
  name: microsandbox-libkrunfw
  version: "5.2.1"
package:
  version: ${{ version }}
  name: ${{ name }}
build:
  number: 5
  script:
    - if: linux and x86_64
      then:
        - gh release download -R superradcompany/libkrunfw -p "libkrunfw-linux-x86_64.so.${{version}}" -O  $PREFIX/bin/libkrunfw.so.${{version}}
      else:
        - gh release download -R superradcompany/libkrunfw -p "libkrunfw-linux-aarch64.so.${{version}}" -O  $PREFIX/bin/libkrunfw.so.${{version}}
requirements:
  run_exports:
    - ${{ pin_subpackage('microsandbox-libkrunfw', exact=True) }}
tests:
  - package_contents:
      file:
        - bin/libkrunfw.so.${{ version }}
