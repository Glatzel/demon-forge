context:
  name: openvdb
  version: "13.0.0"
recipe:
  version: ${{ version }}
  name: ${{ name }}
source:
  - url: https://github.com/AcademySoftwareFoundation/openvdb/archive/refs/tags/v${{ version }}.tar.gz
outputs:
  - staging:
      name: ${{ name }}-build
    build:
      script:
        interpreter: powershell
        file: build-${{ name }}.ps1
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - ${{ "jemalloc" if linux }}
        - cmake 3.*
        - ninja
        - pkg-config
      host:
        - tbb-devel
        - blosc
        - libboost-devel
        - zlib
        - ${{ "glew" if win }}
  - package:
      name: ${{ name }}-rt
    inherit: ${{ name }}-build
    build:
      number: 0
      files:
        - if: osx
          then: lib/*.dylib
        - if: linux
          then: lib/*.so*
        - if: win
          then:
            - Library/*.lib
            - Library/bin/*.dll
    requirements:
      run_exports:
        - ${{ pin_subpackage('openvdb-rt', upper_bound='x.x') }}
    tests:
      - package_contents:
          lib:
            - pystring

  - package:
      name: ${{ name }}-dev
    inherit: ${{ name }}-build
    build:
      number: 0
      files:
        - ${{ 'Library/' if win }}include/*
    requirements:
      host:
        - ${{ name }}-rt
      run_exports:
        - ${{ pin_subpackage('openvdb-rt', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - openvdb.h
  - package:
      name: ${{ name }}-app
    inherit: ${{ name }}-build
    requirements:
      host:
        - ${{ name }}-rt
    build:
      number: 0
      files:
        - ${{ 'bin/*' if unix }}
        - ${{ 'Library/bin/*.exe' if win }}
    tests:
      - package_contents:
          bin:
            - 4channels
            - dcraw_emu
            - raw-identify
            - simple_dcraw
about:
  repository: https://github.com/AcademySoftwareFoundation/openvdb
