context:
  name: opencolorio
  version: "2.5.1"
recipe:
  version: "2.5.1"
  name: ${{ name }}
source:
  url: https://github.com/AcademySoftwareFoundation/OpenColorIO/archive/refs/tags/v${{ version }}.tar.gz
outputs:
  - staging:
      name: opencolorio-build
    build:
      script:
        interpreter: powershell
        file: build-opencolorio.ps1
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake 3.*
        - ninja
      host:
        - expat
        - imath
        - lcms2
        - ${{ 'minizip' if not osx }}
        - pystring-dev
        - yaml-cpp
        - zlib

  - package:
      name: opencolorio-rt
    inherit: opencolorio-build
    requirements:
      run_exports:
        - ${{ pin_subpackage('opencolorio-rt', upper_bound='x.x') }}
    build:
      number: 1
      files:
        - if: osx
          then: lib/*.dylib
        - if: linux
          then: lib/*.so*
        - if: win
          then:
            - Library/*.lib
            - Library/bin/*.dll
    tests:
      - package_contents:
          lib:
            - ${{ 'OpenColorIO*' if win }}
            - ${{ 'libOpenColorIO' if unix }}

  - package:
      name: opencolorio-dev
    inherit: opencolorio-build
    requirements:
      host:
        - opencolorio-rt
      run_exports:
        - ${{ pin_subpackage('opencolorio-rt', upper_bound='x.x') }}
    build:
      number: 2
      files:
        - ${{ 'Library/' if win }}include/*
        - ${{ 'Library/' if win }}lib/cmake/*
        - ${{ 'Library/' if win }}lib/pkgconfig/*
  - staging:
      name: opencolorio-build-app
    build:
      script:
        interpreter: powershell
        file: build-opencolorio-app.ps1
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake 3.*
        - ninja
      host:
        - expat
        - imath
        - lcms2
        - ${{ 'minizip' if not osx }}
        - pystring-dev
        - yaml-cpp
        - zlib
        - openexr
  - package:
      name: opencolorio-app
    inherit: opencolorio-build-app
    requirements:
      host:
        - opencolorio-rt
    build:
      number: 2
      files:
        - bin/*
        - Library/bin/*.exe
    tests:
      - package_contents:
          bin:
            - ocioarchive
            - ociocheck
            - ociochecklut
            - ociobakelut
            - ocioconvert
            - ociocpuinfo
            - ociodisplay
            - ociolutimage
            - ociomakeclf
            - ociomergeconfigs
            - ocioperf
            - ocioview
            - ociowrite
    - scripts:
        - ocioarchive --help
        - ociocheck --help
        - ociochecklut --help
        - ociobakelut --help
        - ocioconvert --help
        - ociocpuinfo --help
        - ociodisplay --help
        - ociolutimage --help
        - ociomakeclf --help
        - ociomergeconfigs --help
        - ocioperf --help
        - ocioview --help
        - ociowrite --help
