context:
  name: proj
  version: "9.8.0"
recipe:
  version: "9.8.0"
  name: ${{ name }}
source:
  url: https://github.com/OSGeo/PROJ/archive/refs/tags/${{ version }}.tar.gz
outputs:
  - staging:
      name: proj-build
    build:
      script:
        interpreter: powershell
        file: build-proj.ps1
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake 3.*
        - ninja
      host:
        - sqlite
        - libtiff
        - libcurl

  - package:
      name: proj-rt
    inherit: proj-build
    requirements:
      run_exports:
        - ${{ pin_subpackage('proj-rt', upper_bound='x.x') }}
    build:
      files:
        - if: osx
          then:
            - lib/*.dylib
            - share/proj/*
        - if: linux
          then:
            - lib/*.so*
            - share/proj/*
        - if: win
          then:
            - Library/*.lib
            - Library/bin/*.dll
            - Library/share/proj/*

  - package:
      name: proj
    inherit: proj-build
    requirements:
      host:
        - proj-rt
      run_exports:
        - ${{ pin_subpackage('proj-rt', upper_bound='x.x') }}
    build:
      number: 1
      files:
        exclude:
          - if: osx
            then:
              - lib/*.dylib
              - share/proj/*
          - if: linux
            then:
              - lib/*.so*
              - share/proj/*
          - if: win
            then:
              - Library/*.lib
              - Library/bin/*.dll
              - Library/share/proj/*
    tests:
      - package_contents:
          include:
            - proj.h
          bin:
            - cs2cs
            - proj
            - cct
            - geod
            - gie
            - invgeod
            - invproj
      - script: projinfo -s EPSG:2230 -t EPSG:26946

about:
  repository: https://github.com/OSGeo/PROJ
  documentation: https://proj.org/en/stable/
